<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kanban Agent</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='1' y='3' width='3.5' height='10' rx='1' fill='%233987e5'/%3E%3Crect x='6.25' y='3' width='3.5' height='7' rx='1' fill='%23fab219'/%3E%3Crect x='11.5' y='3' width='3.5' height='4' rx='1' fill='%230ca30c'/%3E%3C/svg%3E">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/">
      <svg width="18" height="18" viewBox="0 0 16 16" aria-hidden="true"><rect x="1" y="3" width="3.5" height="10" rx="1" fill="#3987e5"/><rect x="6.25" y="3" width="3.5" height="7" rx="1" fill="#fab219"/><rect x="11.5" y="3" width="3.5" height="4" rx="1" fill="#0ca30c"/></svg>
      Kanban Agent
    </a>
    <span class="topbar-right">
      <a class="admin-link" href="/admin" title="User &amp; project admin (hosted mode)">admin</a>
      <span id="live-badge" class="live-badge" title="Live update channel">connecting…</span>
    </span>
  </header>

  <main id="app" aria-live="polite">
    <p class="loading">Loading projects…</p>
  </main>

  <div id="drawer-overlay" class="drawer-overlay" hidden></div>
  <aside id="drawer" class="drawer" hidden aria-label="Work item detail"></aside>

  <script src="/app.js"></script>
</body>
</html>
